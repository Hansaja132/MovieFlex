<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>MovieFlex | Search</title>
    <meta name="description" content="Search for movies using TMDB." />
    <link rel="stylesheet" href="/src/css/main.css" />
  </head>
  <body data-page="search">
    <div id="app-shell">
      <header id="site-header"></header>

      <main>
        <section class="section search-section">
          <div class="container">
            <h1 class="section__title">Search Movies</h1>

            <form id="search-form" class="search-form" role="search" aria-label="Movie search form">
              <input
                id="search-input"
                type="search"
                placeholder="Search by title..."
                aria-label="Search movies"
                required
              />
              <button type="submit" class="btn btn--primary">Search</button>
            </form>

            <div id="search-state" class="state" aria-live="polite"></div>
            <div id="search-results" class="movie-grid"></div>
          </div>
        </section>
      </main>

      <footer id="site-footer"></footer>
    </div>

    <script type="module" src="/src/js/main.js"></script>
  </body>
</html>
