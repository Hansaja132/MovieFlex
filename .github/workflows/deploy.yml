name: Deploy MovieFlex to InfinityFree

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Create TMDB config from secrets
        env:
          TMDB_BEARER_TOKEN: ${{ secrets.VITE_TMDB_BEARER_TOKEN }}
        run: |
          node -e "const fs=require('node:fs');const content=[
            'export const TMDB_BASE_URL = \"https://api.themoviedb.org/3\";',
            'export const TMDB_IMAGE_BASE_URL = \"https://image.tmdb.org/t/p\";',
            `export const TMDB_BEARER_TOKEN = \"${process.env.TMDB_BEARER_TOKEN || ''}\";`,
            '',
            'export function assertTmdbToken() {',
            '  if (!TMDB_BEARER_TOKEN) {',
            '    throw new Error(\"TMDB token is missing. Set TMDB_BEARER_TOKEN in GitHub secrets.\");',
            '  }',
            '}'
          ].join('\n');
          fs.writeFileSync('src/js/api/config.js', content);"

      - name: Build project
        run: npm run build

      - name: Deploy dist via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ftpupload.net
          username: ${{ secrets.INFINITYFREE_FTP_USERNAME }}
          password: ${{ secrets.INFINITYFREE_FTP_PASSWORD }}
          local-dir: ./dist/
          server-dir: /htdocs/
          exclude: |
            **/.git*
            **/.git*/**
            **/node_modules/**
            **/.env*
